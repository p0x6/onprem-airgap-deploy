apiVersion: v1
kind: Service
metadata:
  name: saleor-dashboard
  labels: {{- include "saleor.labels" . | nindent 4 }}
spec:
  selector:
    app: saleor-dashboard
  ports:
    - port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saleor-dashboard
  labels: {{- include "saleor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app: saleor-dashboard
  template:
    metadata:
      labels:
        app: saleor-dashboard
    spec:
      containers:
        - name: dashboard
          image: {{ .Values.images.dashboard }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: API_URL
              value: "https://{{ .Values.host }}/graphql/"
            - name: APP_MOUNT_URI
              value: "/dashboard/"
