apiVersion: apps/v1
kind: Deployment
metadata:
  name: saleor-worker
  labels: {{- include "saleor.labels" . | nindent 4 }}
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: saleor-worker
  template:
    metadata:
      labels:
        app: saleor-worker
    spec:
      {{- include "saleor.fastFailover" . | nindent 6 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: saleor-worker
      containers:
        - name: worker
          image: {{ .Values.images.api }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          # No -B here: beat runs as its own single-replica deployment
          # (beat.yaml) so workers can scale — N embedded beats would run
          # every scheduled task N times.
          command:
            - celery
            - --app=saleor.celeryconf:app
            - worker
            - --loglevel=info
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          env: {{- include "saleor.env" . | nindent 12 }}
