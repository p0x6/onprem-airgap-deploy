apiVersion: v1
kind: Service
metadata:
  name: valkey
  labels: {{- include "saleor.labels" . | nindent 4 }}
spec:
  selector:
    app: valkey
  ports:
    - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  labels: {{- include "saleor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: {{ .Values.images.valkey }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
