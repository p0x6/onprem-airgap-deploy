# Saleor signs JWTs with RS256 when DEBUG=False, so it needs an RSA key.
# Generate it once and keep it stable across upgrades (a new key would log
# everyone out): reuse the deployed secret's key if it exists.
{{- $rsaKey := genPrivateKey "rsa" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "saleor-secrets" }}
{{- if and $existing $existing.data (index $existing.data "rsa-private-key") }}
{{- $rsaKey = index $existing.data "rsa-private-key" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: saleor-secrets
  labels: {{- include "saleor.labels" . | nindent 4 }}
  annotations:
    # The migrate job is a pre-upgrade hook
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  rsa-private-key: {{ $rsaKey | b64enc }}
stringData:
  secret-key: {{ required "set saleor.secretKey" .Values.saleor.secretKey | quote }}
  postgres-password: {{ required "set postgres.password" .Values.postgres.password | quote }}
  database-url: "postgres://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.database }}"
