# The celery scheduler. Exactly one of these, always — beat is the one
# component that must never scale (each instance fires every periodic task).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saleor-beat
  labels: {{- include "saleor.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate   # never two beats, not even during a rollout
  selector:
    matchLabels:
      app: saleor-beat
  template:
    metadata:
      labels:
        app: saleor-beat
    spec:
      containers:
        - name: beat
          image: {{ .Values.images.api }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - celery
            - --app=saleor.celeryconf:app
            - beat
            - --loglevel=info
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          env: {{- include "saleor.env" . | nindent 12 }}
