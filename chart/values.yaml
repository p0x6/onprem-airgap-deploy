images:
  api: ghcr.io/saleor/saleor:3.23.9
  dashboard: ghcr.io/saleor/saleor-dashboard:3.23.8
  postgres: postgres:15-alpine
  valkey: valkey/valkey:8.1-alpine

# Air gap rule: a pull attempt is a bug and should fail loudly.
imagePullPolicy: Never

# Hostname the ingress answers to and the self-signed cert is issued for.
# The operator's machine needs a hosts-file entry pointing this at the box.
host: saleor.local

saleor:
  # Django SECRET_KEY
  secretKey: ""
  debug: "False"

postgres:
  user: saleor
  password: ""          # required, same story as secretKey
  database: saleor
  storage: 10Gi         # local-path PVC
  # Multi-node: pin the DB (and its backups) to one labeled box, e.g.
  #   kubectl label node <name> data=true   ->   nodeSelector: {data: "true"}
  # Empty = schedule anywhere (single-node behavior, unchanged).
  # (Only applies to the single-instance StatefulSet; ha mode ignores it.)
  nodeSelector: {}
  # Replicated postgres with automatic failover (CloudNativePG). Multi-node
  # only — needs the operator that box-install stages on HA installs.
  # When enabled the StatefulSet above is replaced by a 3-instance cluster,
  # anti-affined across nodes, and the app talks to the rw service.
  ha:
    enabled: false
    instances: 3
    image: ghcr.io/cloudnative-pg/postgresql:15.13
    storage: 10Gi

failover:
  tolerationSeconds: 30

# In-enclave registry (multi-node): when enabled, pull policy becomes
# IfNotPresent and nodes fetch missing images from the LAN mirror that
# box-install.sh deploys and seeds. Single-node: leave off.
registry:
  enabled: false

# descheduler runs on a schedule and evicts pods that violate the spread constraints
rebalance:
  enabled: false
  schedule: "*/10 * * * *"
  image: registry.k8s.io/descheduler/descheduler:v0.36.0

# Replicas and optional autoscaling. The HPA needs metrics-server (k3s ships
# it) and CPU requests on the deployments (set). When autoscaling is enabled
# the fixed replica count is ignored — the HPA owns it.
api:
  replicas: 1
  autoscaling:
    enabled: false
    min: 1
    max: 4
    targetCPUPercent: 75
worker:
  replicas: 1
  autoscaling:
    enabled: false
    min: 1
    max: 4
    targetCPUPercent: 75
dashboard:
  replicas: 1

backup:
  schedule: "0 2 * * *"
  hostPath: /var/backups/saleor
  keepDays: 7
