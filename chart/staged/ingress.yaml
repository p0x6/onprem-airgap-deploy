# Self-signed cert generated at install time. Note: regenerates on every helm upgrade
# wouldn't use in production, but fine for my purposes
{{- $cert := genSelfSignedCert .Values.host nil (list .Values.host) 365 }}
apiVersion: v1
kind: Secret
metadata:
  name: saleor-tls
  labels: {{- include "saleor.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  tls.crt: {{ $cert.Cert | quote }}
  tls.key: {{ $cert.Key | quote }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saleor
  labels: {{- include "saleor.labels" . | nindent 4 }}
spec:
  ingressClassName: traefik
  tls:
    - hosts: [{{ .Values.host | quote }}]
      secretName: saleor-tls
  rules:
    - host: {{ .Values.host | quote }}
      http:
        paths:
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: saleor-dashboard
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saleor-api
                port:
                  number: 8000
